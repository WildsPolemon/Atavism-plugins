<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StarNet Core eStore</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>body{font-family:Inter,sans-serif}</style>
</head>
<body class="bg-[#0a0d14] text-white min-h-screen">
  <header class="border-b border-white/10 px-6 py-4 flex items-center justify-between">
    <h1 class="text-xl font-bold bg-gradient-to-r from-indigo-400 to-violet-400 bg-clip-text text-transparent" id="shop-name">StarNet Core Shop</h1>
    <button onclick="toggleCart()" class="relative rounded-xl bg-indigo-600 px-4 py-2 text-sm font-medium">Кошик <span id="cart-count" class="ml-1 rounded-full bg-white/20 px-2">0</span></button>
  </header>
  <main class="p-6 max-w-6xl mx-auto">
    <p class="text-slate-400 mb-6">Онлайн-магазин · інтеграція з POS (як AinurPOS eStore)</p>
    <div id="products" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
  </main>

  <div id="cart-panel" class="fixed inset-y-0 right-0 w-full max-w-md bg-[#0d111c] border-l border-white/10 p-6 translate-x-full transition-transform z-50 overflow-auto">
    <div class="flex justify-between mb-4"><h2 class="font-bold text-lg">Кошик</h2><button onclick="toggleCart()" class="text-slate-400">×</button></div>
    <div id="cart-items" class="space-y-2 mb-4"></div>
    <p class="text-xl font-bold mb-4">Разом: <span id="cart-total">0</span> ₴</p>
    <input id="cust-name" placeholder="Ваше ім'я" class="w-full mb-2 rounded-xl border border-white/10 bg-black/30 px-4 py-2" />
    <input id="cust-phone" placeholder="Телефон" class="w-full mb-2 rounded-xl border border-white/10 bg-black/30 px-4 py-2" />
    <select id="delivery" class="w-full mb-4 rounded-xl border border-white/10 bg-black/30 px-4 py-2">
      <option value="pickup">Самовивіз</option>
      <option value="delivery">Доставка</option>
    </select>
    <button onclick="checkout()" class="w-full rounded-xl bg-violet-600 py-3 font-semibold">Оформити замовлення</button>
    <p id="order-msg" class="mt-3 text-sm text-emerald-400"></p>
  </div>

  <script>
    const API = 'http://localhost:8080';
    let catalog = [], cart = [];

    async function load() {
      const r = await fetch(API + '/api/estore/catalog').then(r => r.json());
      catalog = r.products || [];
      if (r.settings?.company_name) document.getElementById('shop-name').textContent = r.settings.company_name + ' Shop';
      const el = document.getElementById('products');
      el.innerHTML = catalog.map(p => `
        <div class="rounded-2xl border border-white/10 bg-white/5 p-4">
          ${p.image_url ? `<img src="${p.image_url}" class="w-full h-32 object-contain mb-2 rounded-xl" />` : ''}
          <p class="font-medium text-sm">${p.name}</p>
          <p class="text-indigo-400 font-bold mt-1">${p.retail_price} ₴</p>
          <button onclick="addToCart(${p.id})" class="mt-3 w-full rounded-xl bg-indigo-600/80 py-2 text-sm">У кошик</button>
        </div>`).join('');
    }

    function addToCart(id) {
      const p = catalog.find(x => x.id === id);
      const i = cart.findIndex(x => x.product_id === id);
      if (i >= 0) cart[i].quantity++; else cart.push({ product_id: id, name: p.name, price: p.sale_price || p.retail_price, quantity: 1 });
      renderCart();
    }

    function renderCart() {
      document.getElementById('cart-count').textContent = cart.reduce((s,i)=>s+i.quantity,0);
      document.getElementById('cart-items').innerHTML = cart.map((i,idx) => `
        <div class="flex justify-between text-sm py-2 border-b border-white/10">
          <span>${i.name} ×${i.quantity}</span>
          <button onclick="cart.splice(${idx},1);renderCart()" class="text-rose-400">×</button>
        </div>`).join('');
      document.getElementById('cart-total').textContent = cart.reduce((s,i)=>s+i.price*i.quantity,0).toFixed(2);
    }

    function toggleCart() {
      document.getElementById('cart-panel').classList.toggle('translate-x-full');
    }

    async function checkout() {
      const name = document.getElementById('cust-name').value;
      if (!name || !cart.length) return alert('Заповніть ім\'я та додайте товари');
      const r = await fetch(API + '/api/estore/order', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ customer_name: name, phone: document.getElementById('cust-phone').value, delivery_type: document.getElementById('delivery').value, items: cart.map(i=>({product_id:i.product_id,quantity:i.quantity})) })
      }).then(r=>r.json());
      document.getElementById('order-msg').textContent = 'Замовлення #' + r.id + ' прийнято! Дякуємо!';
      cart = []; renderCart();
    }

    load();
  </script>
</body>
</html>
